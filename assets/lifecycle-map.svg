<svg xmlns="http://www.w3.org/2000/svg" width="680" height="640" viewBox="0 0 680 640" role="img" font-family="Arial, Helvetica, sans-serif">
<title>DREC application lifecycle</title>
<desc>The path of a research ethics application from submission through triage, completeness, scoring and decision, to certificate and record, including the conditions, revise, and reject branches.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>
.t{font-size:14px;fill:#1A1A2E}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#5C6488}
.gray rect{fill:#F1EFE8;stroke:#5F5E5A}.gray .th,.gray .t{fill:#2C2C2A}
.blue rect{fill:#E6F1FB;stroke:#185FA5}.blue .th,.blue .t{fill:#042C53}
.purple rect{fill:#EEEDFE;stroke:#534AB7}.purple .th,.purple .t{fill:#26215C}
.teal rect{fill:#E1F5EE;stroke:#0F6E56}.teal .th,.teal .t{fill:#04342C}
.amber rect{fill:#FAEEDA;stroke:#854F0B}.amber .th,.amber .t{fill:#412402}
.coral rect{fill:#FAECE7;stroke:#993C1D}.coral .th,.coral .t{fill:#4A1B0C}
.arr{stroke:#5C6488;stroke-width:1.5;fill:none}
</style>
<text class="ts" x="40" y="30">Main sequence</text>
<g class="gray"><rect x="40" y="44" width="180" height="56" rx="8" stroke-width="0.5"/><text class="th" x="130" y="69" text-anchor="middle">1 · Submit</text><text class="ts" x="130" y="88" text-anchor="middle">Form + Drive packet</text></g>
<g class="blue"><rect x="260" y="44" width="180" height="56" rx="8" stroke-width="0.5"/><text class="th" x="350" y="69" text-anchor="middle">2 · Triage</text><text class="ts" x="350" y="88" text-anchor="middle">Assign pathway</text></g>
<g class="blue"><rect x="480" y="44" width="160" height="56" rx="8" stroke-width="0.5"/><text class="th" x="560" y="69" text-anchor="middle">3 · Completeness</text><text class="ts" x="560" y="88" text-anchor="middle">12-item check</text></g>
<line x1="220" y1="72" x2="258" y2="72" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="72" x2="478" y2="72" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="600" y="120" text-anchor="middle">incomplete</text>
<path d="M560 100 L560 130 L130 130 L130 102" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="560" y1="100" x2="560" y2="156" class="arr" marker-end="url(#arrow)"/>
<g class="blue"><rect x="480" y="158" width="160" height="56" rx="8" stroke-width="0.5"/><text class="th" x="560" y="183" text-anchor="middle">4 · Assign</text><text class="ts" x="560" y="202" text-anchor="middle">Reviewers by pathway</text></g>
<g class="blue"><rect x="260" y="158" width="180" height="56" rx="8" stroke-width="0.5"/><text class="th" x="350" y="183" text-anchor="middle">5 · Score</text><text class="ts" x="350" y="202" text-anchor="middle">Nine-criteria rubric</text></g>
<g class="purple"><rect x="40" y="158" width="180" height="56" rx="8" stroke-width="0.5"/><text class="th" x="130" y="183" text-anchor="middle">6 · Decide</text><text class="ts" x="130" y="202" text-anchor="middle">Committee verdict</text></g>
<line x1="478" y1="186" x2="442" y2="186" class="arr" marker-end="url(#arrow)"/>
<line x1="258" y1="186" x2="222" y2="186" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="40" y="250">Four outcomes</text>
<path d="M130 214 L130 244 L111 244 L111 270" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M130 214 L130 244 L267 244 L267 270" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M130 214 L130 244 L423 244 L423 270" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M130 214 L130 244 L574 244 L574 270" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<g class="teal"><rect x="40" y="272" width="142" height="58" rx="8" stroke-width="0.5"/><text class="th" x="111" y="297" text-anchor="middle">Approved</text><text class="ts" x="111" y="316" text-anchor="middle">All criteria met</text></g>
<g class="teal"><rect x="196" y="272" width="142" height="58" rx="8" stroke-width="0.5"/><text class="th" x="267" y="295" text-anchor="middle">With conditions</text><text class="ts" x="267" y="314" text-anchor="middle">Comply in 15 days</text></g>
<g class="amber"><rect x="352" y="272" width="142" height="58" rx="8" stroke-width="0.5"/><text class="th" x="423" y="295" text-anchor="middle">Revise &amp; resubmit</text><text class="ts" x="423" y="314" text-anchor="middle">Re-review ~3 weeks</text></g>
<g class="coral"><rect x="508" y="272" width="132" height="58" rx="8" stroke-width="0.5"/><text class="th" x="574" y="295" text-anchor="middle">Rejected</text><text class="ts" x="574" y="314" text-anchor="middle">Appeal in 21 days</text></g>
<text class="ts" x="441" y="356" text-anchor="start">revised application re-enters scoring</text>
<path d="M423 330 L423 348 L350 348 L350 216" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M111 330 L111 392" fill="none" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M267 330 L267 392" fill="none" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<g class="teal"><rect x="40" y="394" width="298" height="58" rx="8" stroke-width="0.5"/><text class="th" x="189" y="419" text-anchor="middle">7 · Certify &amp; record</text><text class="ts" x="189" y="438" text-anchor="middle">ECC valid 24 months · entered in public register</text></g>
<line x1="189" y1="452" x2="189" y2="488" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="40" y="482">After clearance · ongoing obligations</text>
<g class="gray"><rect x="40" y="490" width="600" height="118" rx="12" stroke-width="0.5"/><text class="th" x="60" y="517">8 · During &amp; after the study</text></g>
<g class="blue"><rect x="58" y="526" width="138" height="62" rx="8" stroke-width="0.5"/><text class="th" x="127" y="551" text-anchor="middle">Amendment</text><text class="ts" x="127" y="570" text-anchor="middle">DREC-06 first</text></g>
<g class="blue"><rect x="206" y="526" width="138" height="62" rx="8" stroke-width="0.5"/><text class="th" x="275" y="551" text-anchor="middle">Annual compliance</text><text class="ts" x="275" y="570" text-anchor="middle">DREC-07 yearly</text></g>
<g class="coral"><rect x="354" y="526" width="138" height="62" rx="8" stroke-width="0.5"/><text class="th" x="423" y="551" text-anchor="middle">Breach report</text><text class="ts" x="423" y="570" text-anchor="middle">DREC-08 in 72h</text></g>
<g class="teal"><rect x="502" y="526" width="120" height="62" rx="8" stroke-width="0.5"/><text class="th" x="562" y="551" text-anchor="middle">Completion</text><text class="ts" x="562" y="570" text-anchor="middle">DREC-09 at end</text></g>
</svg>
